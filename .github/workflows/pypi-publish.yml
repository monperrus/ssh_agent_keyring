name: Upload Package to PyPI
# authorization handled via trusted publishers / OIDC or use a PYPI_API_TOKEN secret
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Version bump
        uses: monperrus/pyproject-bump-pypi@main
        with:
          file_to_bump: "./pyproject.toml"
          bump_type: "minor"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Publish package
        # This can use OIDC (no secret) if configured as a trusted publisher on PyPI,
        # or use a repository secret named PYPI_API_TOKEN. Keep both options available.
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with: {}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
